<!DOCTYPE html>
<html>

	<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Devil's Gambit</title>
	<link rel="stylesheet" href="style.css">
	</head>

<body>

<div id="main_menu" style="display: none">
	<button style="margin-bottom: 10px; width: 200px;" onclick="toggleMAINMENU(); reset();"><span class="button_content">Apply Deck Changes</span></button>

<div style="display: flex; flex-direction: column; gap: 5px; border: 5px solid white; width: 320px; margin: auto; padding: 10px; border-radius: 10px; text-align: left;">

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <button type="button" onclick="changePreset(-1)" style="height: 30px; width: 40px"><span class="button_content"> « </span></button>
    <div style="text-align: center">Preset:<br><strong id="preset-name" style="text-align: center">Standard</strong></div>
    <button type="button" onclick="changePreset(1)" style="height: 30px; width: 40px"><span class="button_content"> » </span></button>
</div>

        <label><input type="checkbox" id="include-numbers" checked> Numbers (2-10)</label>
        <label><input type="checkbox" id="include-faces" checked> Face Cards (J, Q, K)</label>
        <label><input type="checkbox" id="include-aces" checked> Aces (A)</label>

        <label>
            <input type="checkbox" id="suit-hearts" checked> Hearts (♥️)
            <div class="stepper">
                <button type="button" onclick="changeQty('mult-hearts', -1)">-</button>
                <input type="text" id="mult-hearts" value="1" readonly>
                <button type="button" onclick="changeQty('mult-hearts', 1)">+</button>
            </div>
        </label>
        
        <label>
            <input type="checkbox" id="suit-diamonds" checked> Diamonds (♦️)
            <div class="stepper">
                <button type="button" onclick="changeQty('mult-diamonds', -1)">-</button>
                <input type="text" id="mult-diamonds" value="1" readonly>
                <button type="button" onclick="changeQty('mult-diamonds', 1)">+</button>
            </div>
        </label>

        <label>
            <input type="checkbox" id="suit-clubs" checked> Clubs (♣️)
            <div class="stepper">
                <button type="button" onclick="changeQty('mult-clubs', -1)">-</button>
                <input type="text" id="mult-clubs" value="1" readonly>
                <button type="button" onclick="changeQty('mult-clubs', 1)">+</button>
            </div>
        </label>

        <label>
            <input type="checkbox" id="suit-spades" checked> Spades (♠️)
            <div class="stepper">
                <button type="button" onclick="changeQty('mult-spades', -1)">-</button>
                <input type="text" id="mult-spades" value="1" readonly>
                <button type="button" onclick="changeQty('mult-spades', 1)">+</button>
            </div>
        </label>

        <label>
            <input type="checkbox" id="include-jokers" checked> Include Jokers
            <div class="stepper">
                <button type="button" onclick="changeQty('mult-jokers', -1)">-</button>
                <input type="text" id="mult-jokers" value="1" readonly>
                <button type="button" onclick="changeQty('mult-jokers', 1)">+</button>
            </div>
        </label>

        <label>
		Value Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('value', -1);">-</button>
			<input type="text" id="value_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('value', 1);">+</button>
		</div>
        </label>

        <label>
		Color Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('color', -1);">-</button>
			<input type="text" id="color_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('color', 1);">+</button>
		</div>
        </label>

        <label>
		Suit Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('suit', -1);">-</button>
			<input type="text" id="suit_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('suit', 1);">+</button>
		</div>
        </label>

        <label>
		Value & Color Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('value_color', -1);">-</button>
			<input type="text" id="value_color_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('value_color', 1);">+</button>
		</div>
        </label>

        <label>
		Value & Suit Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('value_suit', -1);">-</button>
			<input type="text" id="value_suit_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('value_suit', 1);">+</button>
		</div>
        </label>

        <label>
		Joker Mult.: 
		<div class="stepper">
		<button type="button" onclick="changeMultiplier('joker', -1);">-</button>
			<input type="text" id="joker_mult_disp" readonly>
		<button type="button" onclick="changeMultiplier('joker', 1);">+</button>
		</div>
        </label>

</div>


</div>

<div id="game_screen" style="display: block;">

	<div id="flex_element_1" class="flex_element_1" style="display: block">

	<button style="margin-bottom: 10px; width: fit-content;" onclick="toggleMAINMENU();"><span class="button_content">Change Deck</span></button><br>

		<button class="cheats_button" onclick="showELEMENT('cheats')">
			<div class="high_score">
				High Score: <span id="highscore">0</span>
			</div>
		</button>

		<div id="cheats" class="cheats">
			<div class="button_divisions">
				Life: <button onclick="addORremove('lifepoints', 1, '+');"><span class="button_content2">+1</span></button>
				<button onclick="addORremove('lifepoints', 1, '-');"><span class="button_content2">-1</span></button> 
				<br>
				Blank: <button onclick="addORremove('blanks', 1, '+')"><span class="button_content2">+1</span></button>
				<button onclick="addORremove('blanks', 1, '-')"><span class="button_content2">-1</span></button> 
				<br>
				Streak: <button onclick="addORremove('streak', 1, '+')"><span class="button_content2">+1</span></button>
				<button onclick="addORremove('streak', 1, '-')"><span class="button_content2">-1</span></button>
			</div>

			<div>
				Value Switch: <span id="valueswitch"></span>; 
				Variable: <span id="variable"></span><br>
				Element: <span id="element"></span>; 
				Multiplier: <span id="multiplier"></span>
			</div>
		</div>

		<div class="score">
			Current Score: <span id="score">0</span>
		</div>

<div style="display: flex; flex-direction: row; gap: 10px; margin: auto; width: fit-content">

<div style="display: flex">

<span id="prev_table_card" style="visibility: hidden; margin: auto; background: white; border: 4px solid #EE4B2B; border-right: none; width: 30px; padding: 5px; border-radius: 10px 0px 0px 10px; height: stretch;">
<span id="table_suit_prev" style="text-align: left; font-size: 25px;"></span>
</span>

<div style="margin: auto; background: white; border: 4px solid #EE4B2B; width: 90px; padding: 5px; gap: 10px; display: flex; flex-direction: column; border-radius: 0px 10px 10px 0px; height: stretch;">
<span id="table_suit_1" style="text-align: left; font-size: 25px;"></span>
<span id="table_number" style="font-size: 30px; color: black;"></span>
<span id="table_suit_2" style="text-align: right; font-size: 25px;"></span>
</div>

</div>

<div id="hand_card" style="display: flex; visibility: hidden">

<span id="prev_hand_card" style="visibility: hidden; margin: auto; background: white; border: 4px solid #EE4B2B; border-right: none; width: 30px; padding: 5px; border-radius: 10px 0px 0px 10px; height: stretch;">
<span id="hand_suit_prev" style="text-align: left; font-size: 25px;"></span>
</span>

<div style="margin: auto; background: white; border: 4px solid #800080; width: 90px; padding: 5px; gap: 10px; display: flex; flex-direction: column; border-radius: 0px 10px 10px 0px; height: stretch;">
<span id="hand_suit_1" style="text-align: left; font-size: 25px;"></span>
<span id="hand_number" style="font-size: 30px; color: black;"></span>
<span id="hand_suit_2" style="text-align: right; font-size: 25px;"></span>
</div>

</div>

</div>

		<div style="display: none" class="current_cards">
			Table Card: <span id="tablecard">None</span>
		</div>

		<div class="current_gambit">
			<span id="currentgambit">Select Your Gambit:</span>
			<br class="small_break">
			<span id="empty_gambit">None</span><span id="gambit_left"></span> <span id="gambit_right"></span>
		</div>

		<div class="info">
			Lives: <span id="lifepoints">3</span> 
			Blanks: <span id="blanks">1</span> 
			Streak: <span id="streak">0</span>
		</div>

		<div class="button_divisions" style="max-width: 370px; display: flex; gap: 5px; margin: auto; flex-direction: row; align-items: center;">
			<button style="width: stretch; flex: 1; height: 35px" onclick="runGAMBIT();"><span class="button_content">Set</span></button>
			<button style="width: stretch; flex: 1; height: 35px" onclick="clearGAMBIT();"><span class="button_content">Clear</span></button>
			<button style="width: stretch; flex: 1; height: 35px" onclick="reset();"><span class="button_content">Reset</span></button>
		</div>

	<div id="gameplay_buttons" style="display: block">
		<div class="button_divisions" style="display: flex; gap: 5px; justify-content: center; align-items: flex-start; max-width: 370px; margin: auto;">

			<div style="display: flex; flex: 4; gap: 5px; flex-direction: column;">
        
				<div style="display: flex; gap: 5px;">
					<button style="flex: 1; height: 35px" class="special_button_1" onclick="setgambitLEFT('Low');"><span class="button_content">Low</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('Red');"><span class="button_content">Red</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('♥️');"><span class="button_content">♥️</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('♦️');"><span class="button_content">♦️</span></button>
				</div>

				<div style="display: flex; gap: 5px;">
					<button style="flex: 1; height: 35px" class="special_button_1" onclick="setgambitLEFT('High');"><span class="button_content">High</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('Black');"><span class="button_content">Black</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('♣️');"><span class="button_content">♣️</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" onclick="setgambitRIGHT('♠️');"><span class="button_content">♠️</span></button>
				</div>
			</div>

			<button id="joker_button" style="flex: 1; height: 75px; display: flex; align-items: center; justify-content: center;" class="special_button_1" onclick="setgambitLEFT('Special')">
				<span class="button_content" style="font-size: 18px">I'm Feeling Lucky</span>
			</button>

		</div>

		<div class="button_divisions" style="max-width: 370px; display: flex; gap: 5px; margin: auto; flex-direction: row; align-items: center;">
			<button style="width: stretch; flex: 1; height: 35px" onclick="toggleELEMENTS();"><span id="togglebutton" class="button_content">Cards</span></button>
			<button style="width: stretch; flex: 1; height: 35px" onclick="useBLANK(); clearGAMBIT2();"><span class="button_content">Blank</span></button>
			<button style="width: stretch; flex: 1; height: 35px" onclick="getLIFEPOINT(); clearGAMBIT2();"><span class="button_content">Sacrifice</span></button>
			<button style="width: stretch; flex: 1; height: 35px" onclick="skipROUND(); clearGAMBIT2();"><span class="button_content">Skip</span></button>
		</div>
	</div>

		<div id="last_chance" class="button_divisions" style="display: none">
			<span class="info">Last Chance D4:</span>
			<br>
			<button class="special_button" onclick="lastCHANCE('1');"><span class="button_content">1</span></button>
			<button class="special_button" onclick="lastCHANCE('2');"><span class="button_content">2</span></button>
			<button class="special_button" onclick="lastCHANCE('3');"><span class="button_content">3</span></button>
			<button class="special_button" onclick="lastCHANCE('4');"><span class="button_content">4</span></button>
			<br>
			<span class="info">Output: <span id="output">0</span></span>
		</div>

	</div>

	<div id="flex_element_2" class="flex_element_2" style="display: none; background: #191919; border: 5px solid white; border-radius: 10px; padding: 10px;">

		<button style="margin-bottom: 10px; width: stretch;" onclick="toggleELEMENTS();"><span id="togglebutton" class="button_content">Resume Game</span></button>

		<div class="history_icons" style="display: flex; align-items: center; flex-direction: column;">

			<div class="icon_counter" style="display: flex; flex-direction: row; gap: 10px; align-items: center;">
				<div>
					🟥: <span id="redcards">0</span><br>
					♦️: <span id="diamondscards">0</span><br>
					♥️: <span id="heartscards">0</span><br>
					▼: <span id="lowcards">0</span><br>
					🂡: <span id="acecards">0</span>
				</div>
				<div>
					⬛: <span id="blackcards">0</span><br>
					♣️: <span id="clubscards">0</span><br>
					♠️: <span id="spadescards">0</span><br>
					▲: <span id="highcards">0</span><br>
					🃏: <span id="jokercards">0</span>
				</div>
			</div>

			<div>Cards Left: <span id="remaining"></span></div>
			<div>Card History:</div>
			<div>(Table & Hand)</div>

			<div id="card_history" class="card_history" style="width: stretch"></div>

		</div>

	</div>

</div>

    <script src="script.js" type="text/javascript"></script>
</body>
</html>
