			<button onclick="addORremoveOPTIONS('skipstreakamount', 1, '-', 0)"><span class="button_content2"> « </span></button>
			<input type="text" id="skipstreakamount" readonly>
			<button onclick="addORremoveOPTIONS('skipstreakamount', 1, '+', 20)"><span class="button_content2"> » </span></button>
		</div>
	</div>
	<div style="display: flex; justify-content: space-between; align-items: center;">
		<label>Score Modifier:</label>
		<div class="stepper">
			<button type="button" onclick="toggleSkipOp()" id="skipscoreop_btn" style="height: 30px; width: 30px"><span class="button_content2">/</span></button>
			<button onclick="addORremoveOPTIONS('skipscoreamount', 1, '-', 0)"><span class="button_content2"> « </span></button>
			<input type="text" id="skipscoreamount" readonly>
			<button onclick="addORremoveOPTIONS('skipscoreamount', 1, '+', 20)"><span class="button_content2"> » </span></button>
		</div>
	</div>
	</div>
</div>

</div>

</div>

<div id="game_screen" style="display: block;">

	<div id="flex_element_1" class="flex_element_1" style="display: block">

		<button class="cheats_button" onclick="showELEMENT('cheats')">
			<div class="high_score">
				High Score: <span id="highscore">0</span>
			</div>
		</button>

		<div class="cheats" style="display: none">
			Value Switch: <span id="valueswitch"></span> 
			Variable: <span id="variable"></span><br>
			Element: <span id="element"></span> 
			Multiplier: <span id="multiplier"></span><br>
		</div>

		<div id="cheats" class="cheats">
			Gambit Chance: <span id="percentage"></span>
		</div>

		<div class="score">
			Score: <span id="score">0</span> / <span id="scoretobeat"></span>
		</div>

<div style="display: flex; flex-direction: row; gap: 10px; margin: auto; width: fit-content; margin-top: 10px; margin-bottom: 10px;">

<div id="table_card" style="margin: auto; background: white; border: 4px solid #EE4B2B; width: 90px; padding: 5px; gap: 10px; display: flex; flex-direction: column; border-radius: 10px; height: 125px;">
<span id="table_suit_1" style="text-align: left; font-size: 25px;"></span>
<span id="table_number" style="font-size: 30px; color: black;"></span>
<span id="table_suit_2" style="text-align: right; font-size: 25px;"></span>
</div>

<div id="hand_card" style="margin: auto; background: none; border: 4px dotted #800080; width: 90px; padding: 5px; gap: 10px; display: flex; flex-direction: column; border-radius: 10px; height: 125px;">
<span id="hand_suit_1" style="text-align: left; font-size: 25px;"></span>
<span id="hand_number" style="font-size: 30px; color: black;"></span>
<span id="hand_suit_2" style="text-align: right; font-size: 25px;"></span>
</div>

</div>

		<div style="display: none" class="current_cards">
			Table Card: <span id="tablecard">None</span>
		</div>

		<div class="current_gambit">
			<span id="currentgambit">Select Your Gambit:</span>
			<br class="small_break">
			<span id="empty_gambit">...</span>
			<span id="full_gambit"><span id="gambit_left"></span> <span id="gambit_right"></span></span>
		</div>

		<div class="info">
			Lives: <span id="lifepoints">3</span> 
			Blanks: <span id="blanks">1</span> 
			Streak: <span id="streak">0</span>
		</div>

		<div class="button_divisions" style="max-width: 300px; display: flex; gap: 5px; margin: auto; flex-direction: row; align-items: center;">
			<button id="set_button" style="width: stretch; flex: 1; height: 35px; display: block;" onclick="runGAMBIT();"><span class="button_content">Set</span></button>
			<button id="clear_button" style="width: stretch; flex: 1; height: 35px; display: block;" onclick="clearGAMBIT();"><span class="button_content">Clear</span></button>
			<button id="reset_button" style="width: stretch; flex: 1; height: 35px" onclick="reset();"><span class="button_content">Reset</span></button>
		</div>

	<div id="gameplay_buttons" style="display: block">
		<div class="button_divisions" style="display: flex; flex-direction: column; gap: 5px; justify-content: center; align-items: flex-start; max-width: 300px; margin: auto;">
        
				<div style="display: flex; gap: 5px; width: 300px;">
					<button style="flex: 1; height: 35px" class="special_button_1" id="btn_gambit_Low" onclick="setgambitLEFT('Low');"><span class="button_content">Low</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Red" onclick="setgambitRIGHT('Red');"><span class="button_content">Red</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Hearts" onclick="setgambitRIGHT('♥️');"><span class="button_content">♥️</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Diamonds" onclick="setgambitRIGHT('♦️');"><span class="button_content">♦️</span></button>
				</div>

				<div style="display: flex; gap: 5px; width: 300px;">
					<button style="flex: 1; height: 35px" class="special_button_1" id="btn_gambit_High" onclick="setgambitLEFT('High');"><span class="button_content">High</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Black" onclick="setgambitRIGHT('Black');"><span class="button_content">Black</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Clubs" onclick="setgambitRIGHT('♣️');"><span class="button_content">♣️</span></button>
					<button style="flex: 1; height: 35px" class="special_button_2" id="btn_gambit_Spades" onclick="setgambitRIGHT('♠️');"><span class="button_content">♠️</span></button>
				</div>

			<button id="btn_gambit_Special" style="flex: 1; height: 35px; display: flex; align-items: center; justify-content: center; width: 100%" class="special_button_1" onclick="setgambitLEFT('Special')">
				<span class="button_content">I'm Feeling Lucky</span>
			</button>

			<div style="display: flex; gap: 5px; width: 300px;">

				<button id="btn_action_Blank" class="special_button" style="width: stretch; flex: 1; height: stretch" onclick="useBLANK()"><span class="button_content">Blank</span></button>

				<div style="display: flex; flex-direction: column;">
 
					<button id="btn_action_SacrificeLife" class="special_button" style="width: stretch; flex: 1; height: 20px; border-bottom: 1.5px solid #b5b5b5; border-radius: 5px 5px 0px 0px" onclick="sacrificeSTREAK('lifepoints');"><span class="button_content">Sacrifice (Life)</span></button>

					<button id="btn_action_SacrificeBlank" class="special_button" style="width: stretch; flex: 1; height: 20px; border-top: 1.5px solid #b5b5b5; border-radius: 0px 0px 5px 5px" onclick="sacrificeSTREAK('blanks');"><span class="button_content">Sacrifice (Blank)</span></button>
				</div>

				<button id="btn_action_Skip" class="special_button" style="width: stretch; flex: 1; height: stretch" onclick="skipROUND()"><span class="button_content">Skip</span></button>

			</div>

		</div>

	</div>

		<div id="last_chance" class="button_divisions" style="display: none">
			<span class="info" id="last_chance_label">Last Chance D4:</span>
			<br>
			<div style="display: flex; flex-direction: row; gap: 5px; justify-content: center;">
				<button id="lc_btn_1" class="special_button" onclick="lastCHANCE('1');"><span class="button_content">1</span></button>
				<button id="lc_btn_2" class="special_button" onclick="lastCHANCE('2');"><span class="button_content">2</span></button>
				<button id="lc_btn_3" class="special_button" onclick="lastCHANCE('3');"><span class="button_content">3</span></button>
				<button id="lc_btn_4" class="special_button" onclick="lastCHANCE('4');"><span class="button_content">4</span></button>
				<button id="lc_btn_5" class="special_button" style="display: none;" onclick="lastCHANCE('5');"><span class="button_content">5</span></button>
				<button id="lc_btn_6" class="special_button" style="display: none;" onclick="lastCHANCE('6');"><span class="button_content">6</span></button>
				<button id="lc_btn_7" class="special_button" style="display: none;" onclick="lastCHANCE('7');"><span class="button_content">7</span></button>
				<button id="lc_btn_8" class="special_button" style="display: none;" onclick="lastCHANCE('8');"><span class="button_content">8</span></button>
			</div>
			<span class="info">Output: <span id="output">0</span></span>
		</div>

		<div class="button_divisions" style="max-width: 300px; display: flex; gap: 5px; margin: auto; flex-direction: row; align-items: center;">
			<button id="card_history_button" style="width: stretch; flex: 1; height: 35px" onclick="toggleELEMENTS();"><span id="togglebutton" class="button_content">Cards</span></button>
			<button id="settings_button" style="width: stretch; flex: 1; height: 35px" onclick="toggleMAINMENU();"><span class="button_content">Settings</span></button>
		</div>

	</div>

	<div id="flex_element_2" class="flex_element_2" style="display: none; width: 300px; background: #191919; border: 5px solid white; border-radius: 10px; padding: 10px;">

		<button style="width: stretch;" onclick="toggleELEMENTS();"><span id="togglebutton" class="button_content">Resume Game</span></button>

		<div class="history_icons" style="display: flex; align-items: center; flex-direction: column;">

			<div class="icon_counter">
					<div>Cards Left: <span id="remaining"></span></div>
					Low: <span id="lowcards">0</span> High: <span id="highcards">0</span><br>
					Red: <span id="redcards">0</span> Black: <span id="blackcards">0</span><br>
					♦️: <span id="diamondscards">0</span> ♥️: <span id="heartscards">0</span><br>
					♣️: <span id="clubscards">0</span> ♠️: <span id="spadescards">0</span><br>
					Ace: <span id="acecards">0</span> Joker: <span id="jokercards">0</span>
			</div>

			<div>Game History:</div>

			<div id="card_history" class="card_history" style="width: stretch"></div>

		</div>

	</div>

</div>

    <script src="script.js" type="text/javascript"></script>
</body>
</html>
